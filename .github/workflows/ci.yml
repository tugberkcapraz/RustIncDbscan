name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: pip install maturin pytest scikit-learn
      - name: Build and install
        run: pip install '.[dev]'
      - name: Run tests
        run: pytest tests/ -v

  wheel-build:
    name: wheel-${{ matrix.os }}-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            target: x86_64
          - os: linux
            runner: ubuntu-latest
            target: aarch64
          - os: macos
            runner: macos-14
            target: x86_64
          - os: macos
            runner: macos-14
            target: aarch64
          - os: windows
            runner: windows-latest
            target: x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.os == 'macos' && format('{0}-apple-darwin', matrix.target) || matrix.target }}
          args: --release --out dist -i 3.12
          manylinux: auto
          before-script-linux: |
            if ! command -v python3 > /dev/null 2>&1; then
              apt-get update && apt-get install -y python3-dev || true
            fi
